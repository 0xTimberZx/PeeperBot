name: CI

# Runs lint, typecheck, and build across every workspace, plus the prdt-bot test
# suite (the app with real coverage). Other inherited scaffold apps don't run
# tests here yet as some assume a live database; scope new test steps per app.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (prdt-bot)
        run: npm run test --workspace=apps/prdt-bot
